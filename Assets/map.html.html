<!DOCTYPE html>
<html>
<head>
    <title>ISS Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; }
        #map { height:100%; width:100%; }

        .panel {
            position: absolute;
            bottom: 10px;
            width: 180px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px;
            font-family: Arial, sans-serif;
            border-radius: 10px;
            text-align: center;
            z-index: 1000;
        }

        #coordsPanel { left: 10px; }
        #crewPanel { right: 10px; }

        .panel-btn {
            position: absolute;
            width: 50px;
            height: 50px;
            background: black;
            color: white;
            border: none;
            cursor: pointer;
            font-family: Arial, sans-serif;
            border-radius: 10px;
            z-index: 1001;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
        }

        #coordsBtn { left: 200px; bottom: 10px; }
        #crewBtn { right: 200px; bottom: 10px; }
    </style>
</head>
<body>
    <div id="map"></div>

    <!-- Panels -->
    <div id="coordsPanel" class="panel">
        <strong>Coordinates</strong><br>
        <div id="lat">Lat: Loading...</div>
        <div id="lon">Lon: Loading...</div>
    </div>

    <div id="crewPanel" class="panel">
        <strong>Crew</strong><br>
        <div id="crew">Loading...</div>
    </div>

    <!-- Buttons -->
    <button id="coordsBtn" class="panel-btn">Coords</button>
    <button id="crewBtn" class="panel-btn">Crew</button>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([0,0],2);
        L.tileLayer('https://{s}.tile.openstreetmap.fr/osmfr/{z}/{x}/{y}.png',{
            attribution:'&copy; OpenStreetMap contributors'
        }).addTo(map);

        // Marker starts invisible
        const myMarker = L.icon({
            iconUrl: 'Rocketship.PNG',
            iconSize: [100, 100],
            iconAnchor: [25, 50],
            popupAnchor: [0, -50]
        });

        // Create the marker and apply the custom icon.
        var marker = L.marker([0, 0], {icon: myMarker, opacity: 0}).addTo(map);


        var coordsPanel = document.getElementById('coordsPanel');
        var crewPanel = document.getElementById('crewPanel');
        var coordsBtn = document.getElementById('coordsBtn');
        var crewBtn = document.getElementById('crewBtn');

        var panelWidth = 180;
        var buttonGap = 25;
        var panelMargin = 10;

        var coordsVisible = true;
        var crewVisible = true;

        function slidePanel(panel, button, side, show){
            var panelTarget = show ? panelMargin : -(panelWidth + panelMargin);
            var buttonTarget = show ? panelMargin + panelWidth + buttonGap : buttonGap;

            var interval = setInterval(() => {
                if(side==='left'){
                    var currentPanel = parseInt(panel.style.left) || panelMargin;
                    var currentButton = parseInt(button.style.left) || panelMargin + panelWidth + buttonGap;

                    var newPanel = show ? Math.min(currentPanel + 20, panelTarget) : Math.max(currentPanel - 30, panelTarget);
                    var newButton = show ? Math.min(currentButton + 20, buttonTarget) : Math.max(currentButton - 30, buttonTarget);

                    panel.style.left = newPanel + 'px';
                    button.style.left = newButton + 'px';

                    if(newPanel === panelTarget && newButton === buttonTarget) clearInterval(interval);
                } else {
                    var currentPanel = parseInt(panel.style.right) || panelMargin;
                    var currentButton = parseInt(button.style.right) || panelMargin + panelWidth + buttonGap;

                    var newPanel = show ? Math.min(currentPanel + 20, panelTarget) : Math.max(currentPanel - 30, panelTarget);
                    var newButton = show ? Math.min(currentButton + 20, buttonTarget) : Math.max(currentButton - 30, buttonTarget);

                    panel.style.right = newPanel + 'px';
                    button.style.right = newButton + 'px';

                    if(newPanel === panelTarget && newButton === buttonTarget) clearInterval(interval);
                }
            }, 15);
        }

        coordsBtn.onclick = function(){
            coordsVisible = !coordsVisible;
            slidePanel(coordsPanel, coordsBtn, 'left', coordsVisible);
        };

        crewBtn.onclick = function(){
            crewVisible = !crewVisible;
            slidePanel(crewPanel, crewBtn, 'right', crewVisible);
        };

        coordsPanel.style.left = panelMargin + 'px';
        crewPanel.style.right = panelMargin + 'px';
        coordsBtn.style.left = (panelMargin + panelWidth + buttonGap) + 'px';
        crewBtn.style.right = (panelMargin + panelWidth + buttonGap) + 'px';
        
        var firstUpdate = true;

        function updateISS(lat, lon){
            marker.setLatLng([lat, lon]);
            marker.setOpacity(1); // show marker now
            
            // Only center once.
            if(firstUpdate){
                map.setView([lat, lon], 3);
                firstUpdate = false;
            }

            document.getElementById('lat').innerText = 'Lat: ' + lat.toFixed(2);
            document.getElementById('lon').innerText = 'Lon: ' + lon.toFixed(2);
        }

        function updateCrew(names){
            document.getElementById('crew').innerHTML = names.join('<br>');
        }

        async function fetchData(){
            try{
                // Fetch ISS position
                const iss = await fetch('https://api.wheretheiss.at/v1/satellites/25544').then(r=>r.json());
                // Fetch crew
                const crew = await fetch('http://api.open-notify.org/astros.json').then(r=>r.json());

                updateISS(iss.latitude, iss.longitude);

                const crewNames = crew.people.filter(p=>p.craft==='ISS').map(p=>p.name);
                updateCrew(crewNames);
            } catch(e){
                console.error(e);
            }
        }

        // Immediately fetch on page load
        fetchData();
        // Repeat every 5 seconds
        setInterval(fetchData, 5000);
    </script>
</body>
</html>
